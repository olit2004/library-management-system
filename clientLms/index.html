<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LMS - Library Management System</title>
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: var(--color-primary-bg, #030712); /* Fallback to dark but let tailwind handle it */
      }
      .loader-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-image: linear-gradient(to bottom, rgba(3, 7, 18, 0.7), rgba(3, 7, 18, 1)), url('/bg.avif');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .loader-glass {
        padding: 3rem 4rem;
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .pulser {
        position: relative;
        width: 72px;
        height: 72px;
        margin-bottom: 2rem;
      }
      .pulser-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #0d9488;
        border-right-color: #14b8a6;
        animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      }
      .pulser-core {
        position: absolute;
        inset: 10px;
        background-color: #14b8a6;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
        box-shadow: 0 0 30px rgba(20, 184, 166, 0.6);
      }
      .loader-text {
        color: #e5e7eb;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-size: 0.875rem;
        animation: pulse-text 2s ease-in-out infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { transform: scale(0.85); opacity: 0.8; } 50% { transform: scale(1); opacity: 1; } }
      @keyframes pulse-text { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root">

      <div class="loader-wrapper">
        <div class="loader-glass">
            <div class="pulser">
              <div class="pulser-ring"></div>
              <div class="pulser-core"></div>
            </div>
            <div class="loader-text">Initializing Environment</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
